name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv sync --frozen --extra dev

    - name: Lint with Ruff
      run: uv run ruff check .

    - name: Format with Ruff
      run: uv run ruff format --check .

    - name: Typecheck with Mypy
      run: uv run mypy src

    - name: Test with Pytest
      run: uv run pytest

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run pip-audit
        # Ignorer CVE-2026-3219 (vulnérabilité pip, upstream non encore disponible).
        run: uv tool run pip-audit --desc on --ignore-vuln CVE-2026-3219
