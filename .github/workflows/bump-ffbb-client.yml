name: Auto-bump ffbb-api-client-v3

on:
  # Triggered by a repository_dispatch from FFBBApiClientV3's publish workflow
  repository_dispatch:
    types: [ffbb-client-released]

  # Fallback: check daily at 07:00 UTC if a new PyPI version is available
  schedule:
    - cron: '0 7 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  bump:
    name: Bump ffbb-api-client-v3
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve current version in uv.lock
        id: current
        run: |
          VERSION=$(grep -A1 'name = "ffbb-api-client-v3"' uv.lock | grep 'version' | head -1 | sed 's/.*= "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run uv lock upgrade
        run: uv lock --upgrade-package ffbb-api-client-v3

      - name: Resolve new version in uv.lock
        id: new
        run: |
          VERSION=$(grep -A1 'name = "ffbb-api-client-v3"' uv.lock | grep 'version' | head -1 | sed 's/.*= "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Skip if no change
        if: steps.current.outputs.version == steps.new.outputs.version
        run: |
          echo "ffbb-api-client-v3 already at ${{ steps.new.outputs.version }}, nothing to do."

      - name: Create Pull Request
        if: steps.current.outputs.version != steps.new.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump ffbb-api-client-v3 to v${{ steps.new.outputs.version }}"
          branch: chore/bump-ffbb-client-${{ steps.new.outputs.version }}
          title: "chore: bump ffbb-api-client-v3 ${{ steps.current.outputs.version }} → ${{ steps.new.outputs.version }}"
          body: |
            ## Automatic dependency bump

            | Package | From | To |
            |---|---|---|
            | `ffbb-api-client-v3` | `${{ steps.current.outputs.version }}` | `${{ steps.new.outputs.version }}` |

            Triggered by: `${{ github.event_name }}`

            > Auto-generated by the `bump-ffbb-client` workflow.
          labels: dependencies
          delete-branch: true
