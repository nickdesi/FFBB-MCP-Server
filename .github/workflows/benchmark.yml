name: Benchmark

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies (robust)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # retry once on transient network failures when installing editable package
          python -m pip install -e .[dev] || python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

      - name: Run lightweight benchmark
        run: python tools/measure_services.py
