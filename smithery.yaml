startCommand:
  type: stdio
  config: uv run ffbb-mcp
configSchema:
  type: object
  required:
    - ALLOWED_HOSTS
    - ALLOWED_ORIGINS
    - ENABLE_DNS_PROTECTION
    - PUBLIC_URL
    - MCP_MODE
  properties:
    ALLOWED_HOSTS:
      type: string
      description: Comma-separated list of allowed hosts for security.
      default: "localhost,127.0.0.1,ffbb.desimone.fr"
    ALLOWED_ORIGINS:
      type: string
      description: Comma-separated list of allowed origins for CORS.
      default: "http://localhost:5173,https://ffbb.desimone.fr"
    ENABLE_DNS_PROTECTION:
      type: boolean
      description: Enable DNS rebinding protection. Set to true for production.
      default: true
    PUBLIC_URL:
      type: string
      description: Optional public URL of the MCP server (used for proxying).
      default: "https://ffbb.desimone.fr"
    MCP_MODE:
      type: string
      description: The execution mode of the MCP server (sse or stdio).
      default: "stdio"
